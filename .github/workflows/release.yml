name: Build & Release macOS Universal

# Trigger on every push to the main branch.
on:
  push:
    branches:
      - main

# Ensure only one release job runs at a time; cancel in-progress runs on
# the same branch when a new push arrives so stale builds don't pile up.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build macOS Universal & create release draft
    runs-on: macos-14        # Apple Silicon (arm64) GitHub-hosted runner

    permissions:
      contents: write        # Required to create releases and upload assets

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Read version from pubspec.yaml ────────────────────────────────────
      # Parses   version: 1.2.3+42   →  build_name=1.2.3  build_number=42
      - name: Read version from pubspec.yaml
        id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          BUILD_NAME=$(echo "$RAW" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$RAW" | cut -d'+' -f2)
          echo "build_name=$BUILD_NAME"       >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER"   >> "$GITHUB_OUTPUT"
          # Include the GitHub run number so every push produces a unique tag
          # even when the version in pubspec hasn't been bumped yet.
          echo "tag=v${BUILD_NAME}+build.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "release_name=Snapd v${BUILD_NAME} (build ${{ github.run_number }})" >> "$GITHUB_OUTPUT"

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Install Dart/Flutter dependencies
        run: flutter pub get

      # Flutter's Xcode build phases reference xcfilelist files in
      # macos/build/ephemeral/ via the $(FLUTTER_BUILD_DIR)/ephemeral/ variable.
      # On a fresh checkout these files don't exist, which causes xcodebuild to
      # abort before it can run macos_assemble.sh (which would create them).
      # Creating empty placeholders unblocks Xcode so the first build succeeds.
      - name: Create Flutter macOS ephemeral xcfilelist placeholders
        run: |
          mkdir -p macos/build/ephemeral
          touch macos/build/ephemeral/App.framework.xcfilelist
          touch macos/build/ephemeral/FlutterMacOS.framework.xcfilelist
          touch macos/build/ephemeral/App.framework-output.xcfilelist
          touch macos/build/ephemeral/FlutterMacOS.framework-output.xcfilelist

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build macOS release app (arm64)
        run: |
          flutter build macos --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"

      # Build the x86_64 (Intel) slice by calling xcodebuild directly with
      # -arch x86_64.  Because Flutter adds a "Run Script" build phase that
      # calls macos_assemble.sh, xcodebuild will re-run the Dart AOT compiler
      # for x86_64, producing a proper x86_64 App.framework alongside the
      # x86_64 Swift runner binary.
      - name: Build x86_64 (Intel) slice
        shell: bash
        run: |
          set -euo pipefail
          pushd macos
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath ../build/xcode_derived_x86_64 \
            -arch x86_64 \
            -sdk macosx \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          popd

      # Merge the arm64 and x86_64 slices into a universal binary.
      # Both the Swift runner executable AND the compiled Dart library
      # (App.framework) must be combined; FlutterMacOS.framework is already
      # a universal framework supplied by the Flutter SDK.
      - name: Create universal binary (arm64 + x86_64)
        shell: bash
        run: |
          set -euo pipefail

          ARM64_APP="build/macos/Build/Products/Release/snapd.app"
          X86_APP="build/xcode_derived_x86_64/Build/Products/Release/snapd.app"

          # Verify both builds produced the expected app bundle
          for path in "$ARM64_APP/Contents/MacOS/snapd" \
                      "$X86_APP/Contents/MacOS/snapd"; do
            if [ ! -f "$path" ]; then
              echo "Expected binary not found: $path"
              exit 1
            fi
          done

          echo "Before lipo:"
          lipo -info "$ARM64_APP/Contents/MacOS/snapd"
          lipo -info "$X86_APP/Contents/MacOS/snapd"

          # 1. Merge the main Swift runner executable
          lipo -create \
            -output "$ARM64_APP/Contents/MacOS/snapd" \
            "$ARM64_APP/Contents/MacOS/snapd" \
            "$X86_APP/Contents/MacOS/snapd"

          # 2. Merge the Dart AOT library (App.framework)
          ARM64_APP_FW="$ARM64_APP/Contents/Frameworks/App.framework/App"
          X86_APP_FW="$X86_APP/Contents/Frameworks/App.framework/App"
          if [ -f "$ARM64_APP_FW" ] && [ -f "$X86_APP_FW" ]; then
            lipo -create \
              -output "$ARM64_APP_FW" \
              "$ARM64_APP_FW" \
              "$X86_APP_FW"
            echo "App.framework after lipo:"
            lipo -info "$ARM64_APP_FW"
          else
            echo "Warning: App.framework binaries not found – skipping App.framework lipo"
          fi

          echo "Universal runner after lipo:"
          lipo -info "$ARM64_APP/Contents/MacOS/snapd"

      # ── 5. Package ───────────────────────────────────────────────────────────
      - name: Package .app as a zip archive (universal)
        run: |
          APP_PATH="build/macos/Build/Products/Release/snapd.app"
          ZIP_NAME="snapd-${{ steps.version.outputs.build_name }}-macos-universal.zip"
          # Preserve symlinks (-y) so the .app bundle remains valid.
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      # ── 6. Release draft ─────────────────────────────────────────────────────
      - name: Create GitHub release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## ${{ steps.version.outputs.release_name }}

            > **Status:** Draft — review and publish when ready.

            ### What's in this build

            | Field | Value |
            |-------|-------|
            | Version | `${{ steps.version.outputs.build_name }}` |
            | Build number | `${{ steps.version.outputs.build_number }}` |
            | Platform | macOS Universal (arm64 + x86_64) |
            | Commit | `${{ github.sha }}` |
            | Triggered by | `${{ github.actor }}` |

            ### Installation

            1. Download **`${{ env.ZIP_NAME }}`** below.
            2. Unzip it (double-click or `unzip snapd-*.zip`).
            3. Drag **`snapd.app`** to your `/Applications` folder.
            4. On first launch right-click → **Open** to bypass Gatekeeper (unsigned build).

            ### Requirements

            - macOS 11.0 Big Sur or later
            - Apple Silicon **or** Intel Mac (universal binary — no Rosetta needed)
          files: ${{ env.ZIP_NAME }}
